<!DOCTYPE HTML>
<html>
<head>
	<title>Sport - 100</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
	<link rel="stylesheet" href="assets/css/main.css" />
	<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
</head>

<body class="is-preload">

<div id="wrapper" class="fade-in">

	<header id="header">
		<a href="index.html" class="logo">Sport - 100</a>
	</header>

	<nav id="nav">
		<ul class="links">
			<li class="active"><a href="index.html">Inicio</a></li>
			<li><a href="horarios.html">Horarios</a></li>
			<li><a href="usuarios.html">Usuarios</a></li>
		</ul>
	</nav>

	<div id="main">

		<article class="post featured">

			<header class="major">
				<h2>Panel de administración</h2>
				<p>Gestión de reservas y usuarios del sistema.</p>
			</header>

			
			<div style="display:flex; gap:15px; flex-wrap:wrap; margin-bottom:20px;">

				<div style="flex:1; padding:15px; background:#f2f2f2; border-radius:10px;">
					<h3>Total</h3>
					<h2 id="total">0</h2>
				</div>

				<div style="flex:1; padding:15px; background:#d1f7d6; border-radius:10px;">
					<h3>Confirmadas</h3>
					<h2 id="confirmadas">0</h2>
				</div>

				<div style="flex:1; padding:15px; background:#fff3cd; border-radius:10px;">
					<h3>Pendientes</h3>
					<h2 id="pendientes">0</h2>
				</div>

				<div style="flex:1; padding:15px; background:#f8d7da; border-radius:10px;">
					<h3>Canceladas</h3>
					<h2 id="canceladas">0</h2>
				</div>

			</div>

		
			<div class="table-wrapper">
				<table>
					<thead>
						<tr>
							<th>Usuario</th>
							<th>Cancha</th>
							<th>Fecha/Hora</th>
							<th>Estado</th>
							<th>Acción</th>
						</tr>
					</thead>

					<tbody id="tablaReservas"></tbody>
				</table>
			</div>

			<!-- BOTONES -->
			<ul class="actions special">

				<li>
					<a href="gestio-reservas.html" class="button">
						Gestionar reservas
					</a>
				</li>

				<li>
					<a href="gestión-usuarios.html" class="button">
						Administrar usuarios
					</a>
				</li>

			</ul>

		</article>

	</div>

</div>

<script>

let reservas = JSON.parse(localStorage.getItem("reservas")) || [];

window.onload = function () {
	render();
	actualizarDashboard();
};

function render() {

	let tabla = document.getElementById("tablaReservas");
	tabla.innerHTML = "";

	reservas.forEach((r, i) => {

		tabla.innerHTML += `
			<tr>
				<td>${r.usuario}</td>
				<td>${r.cancha}</td>
				<td>${r.fecha} ${r.hora}</td>
				<td>${r.estado}</td>
				<td>
					<button onclick="cambiarEstado(${i})">Cambiar estado</button>
					<button onclick="eliminar(${i})">Eliminar</button>
				</td>
			</tr>
		`;
	});

	actualizarDashboard();
}

function cambiarEstado(i) {

	if (reservas[i].estado === "Pendiente") {
		reservas[i].estado = "Confirmada";
	} else if (reservas[i].estado === "Confirmada") {
		reservas[i].estado = "Cancelada";
	} else {
		reservas[i].estado = "Pendiente";
	}

	localStorage.setItem("reservas", JSON.stringify(reservas));
	render();
}

function eliminar(i) {

	reservas.splice(i, 1);

	localStorage.setItem("reservas", JSON.stringify(reservas));
	render();
}

function actualizarDashboard() {

	document.getElementById("total").innerText = reservas.length;

	document.getElementById("confirmadas").innerText =
		reservas.filter(r => r.estado === "Confirmada").length;

	document.getElementById("pendientes").innerText =
		reservas.filter(r => r.estado === "Pendiente").length;

	document.getElementById("canceladas").innerText =
		reservas.filter(r => r.estado === "Cancelada").length;
}

</script>

</body>
</html>
