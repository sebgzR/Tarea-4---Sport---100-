<!DOCTYPE HTML>
<html>
	<head>
		<title>Sport - 100</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
	</head>

	<body class="is-preload">

	<div id="wrapper" class="fade-in">

		<!-- HEADER -->
		<header id="header">
			<a href="index.html" class="logo">Sport - 100</a>
		</header>

		<div id="main">

			<article class="post featured">

				<header class="major">
					<h2>Gestión de reservas</h2>
					<p>Administra las reservas del sistema.</p>
				</header>

				<div class="table-wrapper">
					<table>
						<thead>
							<tr>
								<th>Usuario</th>
								<th>Cancha</th>
								<th>Fecha / Hora</th>
								<th>Estado</th>
								<th>Acción</th>
							</tr>
						</thead>

						<tbody id="tablaReservas"></tbody>
					</table>
				</div>

				<ul class="actions special">
					<li>
						<a href="admin.html" class="button">
							Volver al panel
						</a>
					</li>
				</ul>

			</article>

		</div>

	</div>

	<script>
	let reservas = JSON.parse(localStorage.getItem("reservas")) || [];

	window.onload = function () {
		renderizar();
	};

	function renderizar() {

		let tabla = document.getElementById("tablaReservas");
		tabla.innerHTML = "";

		reservas.forEach((r, i) => {

			tabla.innerHTML += `
				<tr>
					<td>${r.usuario}</td>
					<td>${r.cancha}</td>
					<td>${r.fecha} ${r.hora}</td>
					<td>${r.estado}</td>
					<td>
						<button onclick="cambiarEstado(${i})">Estado</button>
						<button onclick="eliminar(${i})">Eliminar</button>
					</td>
				</tr>
			`;
		});
	}

	function cambiarEstado(i) {

		if (reservas[i].estado === "Pendiente") {
			reservas[i].estado = "Confirmada";
		} else if (reservas[i].estado === "Confirmada") {
			reservas[i].estado = "Cancelada";
		} else {
			reservas[i].estado = "Pendiente";
		}

		localStorage.setItem("reservas", JSON.stringify(reservas));
		renderizar();
	}

	function eliminar(i) {
		reservas.splice(i, 1);
		localStorage.setItem("reservas", JSON.stringify(reservas));
		renderizar();
	}
	</script>

	</body>
</html>
