<!DOCTYPE HTML>
<html>
<head>
	<title>Sport - 100</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
	<link rel="stylesheet" href="assets/css/main.css" />
</head>

<body class="is-preload">

<div id="wrapper">

	<header id="header">
		<a href="index.html" class="logo">Sport - 100</a>
	</header>

	<nav id="nav">
		<ul class="links">
			<li class="active"><a href="index.html">Inicio</a></li>
			<li><a href="reservas.html">Reservas</a></li>
			<li><a href="admin.html">Admin</a></li>
		</ul>
	</nav>

	<div id="main">

		<article class="post featured">

			<header class="major">
				<h2>Horarios de canchas</h2>
				<p>Reservas registradas por cancha y horario</p>
			</header>

			<div class="table-wrapper">
				<table>
					<thead>
						<tr>
							<th>Cancha</th>
							<th>Horario reservado</th>
							<th>Usuario</th>
						</tr>
					</thead>

					<tbody id="tablaHorarios"></tbody>
				</table>
			</div>

		</article>

	</div>

</div>

<script>

let reservas = JSON.parse(localStorage.getItem("reservas")) || [];

let canchas = [
	"Cancha Central",
	"Cancha Sintética Norte",
	"Cancha La 100"
];

window.onload = function () {
	render();
};

function render() {

	let tabla = document.getElementById("tablaHorarios");
	tabla.innerHTML = "";

	canchas.forEach(cancha => {

		let filtradas = reservas.filter(r =>
			r.cancha === cancha &&
			r.estado !== "Cancelada"
		);

		if (filtradas.length === 0) {

			tabla.innerHTML += `
				<tr>
					<td>${cancha}</td>
					<td colspan="2" style="color:gray">
						Sin registros
					</td>
				</tr>
			`;

		} else {

			filtradas.forEach(r => {

				tabla.innerHTML += `
					<tr>
						<td>${cancha}</td>
						<td>${r.fecha} | ${r.horaInicio} - ${r.horaFin}</td>
						<td>${r.usuario}</td>
					</tr>
				`;
			});
		}
	});
}

</script>

</body>
</html>
